<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Élan Fitness // Member Portal Access</title>
    
    <!-- Google Fonts: Syne (Display) & Plus Jakarta Sans (Body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-primary: #050505;
            --bg-secondary: #0d0d0d;
            --accent-neon: #c6ff00;
            --accent-neon-rgb: 198, 255, 0;
            --accent-glow: rgba(198, 255, 0, 0.4);
            --accent-glow-subtle: rgba(198, 255, 0, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #9a9a9a;
            --text-muted: #505050;
            --font-display: 'Syne', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --glass-bg: rgba(13, 13, 13, 0.65);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-border-focus: rgba(198, 255, 0, 0.25);
            --transition-smooth: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            --transition-fast: all 0.2s ease;
            --cursor-size: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-drag: none;
        }

        html, body {
            min-height: 100%;
            height: auto;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-body);
            overflow-x: hidden;
            overflow-y: auto; /* Fix for cropped viewport bounds on short-height displays */
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-neon);
        }

        /* Mouse interactions */
        .custom-cursor {
            width: var(--cursor-size);
            height: var(--cursor-size);
            background: var(--accent-neon);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
            transition: width 0.2s, height 0.2s, background-color 0.2s;
            display: none;
        }

        .custom-cursor-glow {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(198,255,0,0.12) 0%, rgba(198,255,0,0) 70%);
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
            display: none;
        }

        @media (pointer: fine) {
            .custom-cursor, .custom-cursor-glow {
                display: block;
            }
        }

        /* Background system */
        #login-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .glow-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(180px);
            opacity: 0.15;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        .glow-blob-1 {
            background: radial-gradient(circle, rgba(198, 255, 0, 0.4) 0%, rgba(198, 255, 0, 0) 70%);
            width: min(80vw, 800px);
            height: min(80vw, 800px);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: float-blob-center 20s infinite alternate ease-in-out;
        }

        /* Page layout structure optimized for ultrawide displays */
        .login-wrapper {
            position: relative;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            min-height: 100vh;
            max-width: 1400px; /* Prevents visual separation on ultrawide screens */
            margin: 0 auto;
            padding: clamp(2rem, 5vh, 4rem) clamp(1.5rem, 5vw, 4rem);
            gap: clamp(2rem, 6vw, 6rem);
            box-sizing: border-box;
        }

        .back-to-home {
            position: absolute;
            top: clamp(1.5rem, 4vh, 2.5rem);
            left: clamp(1.5rem, 5vw, 4rem);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
            transition: var(--transition-smooth);
        }

        .back-to-home i {
            font-size: 0.75rem;
            transition: var(--transition-smooth);
        }

        .back-to-home:hover {
            color: var(--accent-neon);
            transform: translateX(-5px);
        }

        /* Left Editorial Column */
        .left-side {
            flex: 1.1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            z-index: 6;
            min-width: 0; /* Flexbox text safety guard */
        }

        .portal-heading {
            font-family: var(--font-display);
            font-size: clamp(2.4rem, 4.5vw, 4.2rem);
            font-weight: 800;
            line-height: 1.0;
            letter-spacing: -0.04em;
            text-transform: uppercase;
            color: var(--text-primary);
            margin-bottom: clamp(1.2rem, 3vh, 2rem);
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .highlight-elan {
            color: transparent;
            -webkit-text-stroke: 1.5px var(--accent-neon);
            opacity: 0.9;
            letter-spacing: -0.01em;
        }

        .portal-divider {
            width: 80px;
            height: 3px;
            background: var(--accent-neon);
            margin-bottom: clamp(1.5rem, 4vh, 2.5rem);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--accent-glow);
            animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .portal-subtitle {
            font-size: clamp(0.95rem, 1.1vw, 1.1rem);
            color: var(--text-secondary);
            font-weight: 400;
            line-height: 1.6;
            max-width: 480px;
            margin-bottom: clamp(2rem, 5vh, 3.5rem);
            opacity: 0.85;
            animation: fadeUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Mini stats details */
        .portal-stats {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(1.5rem, 3vw, 3rem);
            animation: fadeUp 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .stat-line {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            min-width: 120px;
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: clamp(1.3rem, 2vw, 1.6rem);
            font-weight: 700;
            color: var(--accent-neon);
        }

        .stat-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        /* Right Card Column */
        .right-side {
            flex: 0.9;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 6;
            min-width: 0;
            width: 100%;
        }

        /* Glassmorphism Card Design */
        .login-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 100%;
            max-width: 460px;
            border-radius: 28px;
            padding: clamp(1.8rem, 5vh, 3.5rem) clamp(1.5rem, 4vw, 3.0rem);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 40px rgba(198,255,0,0.02);
            transition: border-color 0.5s ease, box-shadow 0.5s ease;
            animation: scaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            box-sizing: border-box;
        }

        .login-card:hover {
            border-color: var(--glass-border-focus);
            box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 40px rgba(198,255,0,0.04);
        }

        .card-header {
            margin-bottom: clamp(1.8rem, 4vh, 3rem);
            text-align: center;
        }

        .card-tag {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent-neon);
            font-weight: 700;
            margin-bottom: 0.75rem;
            display: inline-block;
        }

        .card-title {
            font-family: var(--font-display);
            font-size: clamp(1.3rem, 2vw, 1.6rem);
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        /* Dynamic input fields structure */
        .form-group {
            position: relative;
            margin-bottom: clamp(1.5rem, 3.5vh, 2.25rem);
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.15rem 1.25rem;
            font-family: var(--font-body);
            font-size: 0.95rem;
            color: var(--text-primary);
            outline: none;
            transition: var(--transition-smooth);
            box-sizing: border-box;
        }

        .form-input:focus {
            border-color: var(--accent-neon);
            background: rgba(198, 255, 0, 0.02);
            box-shadow: 0 0 15px rgba(198, 255, 0, 0.05);
        }

        /* Floating dynamic labels */
        .form-label {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            pointer-events: none;
            transition: var(--transition-smooth);
        }

        .form-input:focus ~ .form-label,
        .form-input:not(:placeholder-shown) ~ .form-label {
            top: 0;
            transform: translateY(-50%) scale(0.85);
            background: var(--bg-secondary);
            padding: 0 0.5rem;
            color: var(--accent-neon);
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        /* Password input security components */
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-toggle {
            position: absolute;
            right: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px;
            transition: var(--transition-smooth);
            z-index: 10;
        }

        .password-toggle:hover {
            color: var(--accent-neon);
        }

        /* Access action button */
        .access-btn {
            width: 100%;
            background: var(--accent-neon);
            color: #000;
            border: none;
            padding: 1.15rem;
            font-family: var(--font-body);
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px var(--accent-glow-subtle);
            margin-top: clamp(1.5rem, 4vh, 2.5rem);
            margin-bottom: 2rem;
        }

        .access-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .access-btn:hover::before {
            left: 100%;
        }

        .access-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        /* Biometric state loading spinner */
        .btn-loader {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid #000;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Footer links styling */
        .card-footer {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .join-club-link {
            color: var(--accent-neon);
            text-decoration: none;
            font-weight: 700;
            position: relative;
            padding-bottom: 2px;
            margin-left: 0.25rem;
            transition: var(--transition-smooth);
        }

        .join-club-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1.5px;
            background: var(--accent-neon);
            transition: var(--transition-smooth);
        }

        .join-club-link:hover::after {
            width: 100%;
        }

        /* Notification Toasts Container */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: calc(100vw - 4rem);
        }

        .toast-box {
            background: var(--glass-bg);
            border: 1px solid var(--accent-neon);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            color: var(--text-primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(198,255,0,0.2);
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .toast-box.show {
            transform: translateX(0);
        }

        /* Keyframe configurations */
        @keyframes float-blob-center {
            0% { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-45%, -45%) scale(1.08); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Adaptive Media Breakpoints and Heights Safety system */
        @media (max-width: 1024px) {
            .login-wrapper {
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 3rem;
                padding-top: 7rem;
                padding-bottom: 4rem;
                min-height: 100vh;
                height: auto;
            }

            .back-to-home {
                top: 2rem;
                left: 2rem;
            }

            .left-side {
                align-items: center;
                text-align: center;
                flex: none;
                width: 100%;
            }

            .portal-subtitle {
                margin-left: auto;
                margin-right: auto;
                margin-bottom: 2.5rem;
            }

            .portal-stats {
                justify-content: center;
                width: 100%;
            }

            .right-side {
                width: 100%;
                flex: none;
            }

            .login-card {
                max-width: 100%;
            }
        }

        /* Tablet landscape and short-screen notebook adjustments */
        @media (max-height: 700px) and (min-width: 1025px) {
            .portal-heading {
                margin-bottom: 1rem;
            }
            .portal-divider {
                margin-bottom: 1.2rem;
            }
            .portal-subtitle {
                margin-bottom: 2rem;
            }
            .login-card {
                padding: 2rem;
            }
            .form-group {
                margin-bottom: 1.5rem;
            }
            .access-btn {
                margin-top: 1.5rem;
                margin-bottom: 1.2rem;
            }
        }

        @media (max-width: 640px) {
            .login-wrapper {
                padding: 6.5rem 1.25rem 3rem;
            }
            
            .back-to-home {
                left: 1.25rem;
            }

            .portal-stats {
                gap: 1.5rem;
                flex-wrap: wrap;
                justify-content: space-around;
            }
            
            .stat-line {
                min-width: 40%;
                text-align: center;
            }

            .login-card {
                padding: 2.25rem 1.5rem;
                border-radius: 20px;
            }
            
            .toast-container {
                bottom: 1rem;
                right: 1rem;
                max-width: calc(100vw - 2rem);
            }
        }

        @media (max-width: 380px) {
            .portal-heading {
                font-size: 2rem;
            }
            .stat-value {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- CUSTOM CURSOR -->
    <div class="custom-cursor" id="cursor"></div>
    <div class="custom-cursor-glow" id="cursor-glow"></div>

    <!-- BACKGROUND CANVAS PARTICLES -->
    <canvas id="login-canvas"></canvas>
    
    <!-- ENVIRONMENT GLOW AMBIENT -->
    <div class="glow-blob glow-blob-1"></div>

    <!-- TOAST ALERTS CONTAINER -->
    <div class="toast-container" id="toast-container"></div>

    <!-- MAIN ACCESS CARD VIEWPORT -->
    <div class="login-wrapper">
        
        <!-- BACK NAVIGATION -->
        <a href="homepage.html" class="back-to-home magnetic-target">
            <i class="fa-solid fa-arrow-left"></i> Home Base
        </a>

        <!-- LEFT SIDE BRAND PORTAL EDITORIAL -->
        <div class="left-side">
            <h1 class="portal-heading">
                Maintain THE<br>
                <span class="highlight-elan">ÉLAN</span><br>
            </h1>
            <div class="portal-divider"></div>
            <p class="portal-subtitle">Access your personalized fitness intelligence, transformation tracking, and elite performance tools.</p>
            
            <!-- SUBTLE BIOMETRIC METRICS PREVIEW -->
            <div class="portal-stats">
                <div class="stat-line">
                    <span class="stat-value">Admin</span>
                    <span class="">admin@gmail.com</span>
                </div>
                <div class="stat-line">
                    <span class="stat-value">Client</span>
                    <span class="">user@gmail.com</span>
                </div>
                <div class="stat-line">
                    <span class="stat-value">Password</span>
                    <span class="">test123</span>
                </div>
            </div>
        </div>

        <!-- RIGHT SIDE AUTHENTICATION INTERACTIVE CONTAINER -->
        <div class="right-side">
            <div class="login-card">
                <div class="card-header">
                    <span class="card-tag">Exclusive Access</span>
                    <h2 class="card-title">MEMBER ONLY</h2>
                </div>

                <form id="auth-form" onsubmit="handlePortalAccess(event)">
                    <!-- EMAIL GROUP -->
                    <div class="form-group">
                        <input type="email" id="email" class="form-input" placeholder=" " required autocomplete="email">
                        <label for="email" class="form-label">Email Address</label>
                    </div>

                    <!-- PASSWORD GROUP -->
                    <div class="form-group password-wrapper">
                        <input type="password" id="password" class="form-input" placeholder=" " required autocomplete="current-password">
                        <label for="password" class="form-label">Password</label>
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility()" aria-label="Toggle password visibility">
                            <i class="fa-solid fa-eye" id="password-toggle-icon"></i>
                        </button>
                    </div>

                    <!-- ACCESS CTA SUBMIT -->
                    <button type="submit" class="access-btn magnetic-target" id="submit-btn">
                        <span id="btn-text">Log in</span>
                        <div class="btn-loader" id="btn-loader"></div>
                    </button>

                    <!-- REGISTRATION REDIRECT FOR VIP PROSPECTIVE -->
                    <div class="card-footer">
                        <span>Don’t have an account?</span>
                        <a href="homepage.html" class="join-club-link">Join the Club</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        /* Custom Cursor Logic & Coordinate Tracking */
        const cursor = document.getElementById('cursor');
        const cursorGlow = document.getElementById('cursor-glow');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            // Smoother lagging mouse-follow glow effect
            cursorGlow.animate({
                left: `${e.clientX}px`,
                top: `${e.clientY}px`
            }, { duration: 500, fill: "forwards" });
        });

        // Add cursor scaling hover effects on interactive UI elements
        const interactiveElements = document.querySelectorAll('a, button, input');
        interactiveElements.forEach(elem => {
            elem.addEventListener('mouseenter', () => {
                cursor.style.width = '35px';
                cursor.style.height = '35px';
                cursor.style.backgroundColor = 'transparent';
                cursor.style.border = '2px solid var(--accent-neon)';
                cursor.style.mixBlendMode = 'normal';
            });
            elem.addEventListener('mouseleave', () => {
                cursor.style.width = 'var(--cursor-size)';
                cursor.style.height = 'var(--cursor-size)';
                cursor.style.backgroundColor = 'var(--accent-neon)';
                cursor.style.border = 'none';
                cursor.style.mixBlendMode = 'difference';
            });
        });

        /* Magnetic Hover Effect on CTA elements */
        const magneticTargets = document.querySelectorAll('.magnetic-target');
        magneticTargets.forEach(target => {
            target.addEventListener('mousemove', (e) => {
                const rect = target.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                target.style.transform = `translate(${x * 0.25}px, ${y * 0.25}px)`;
            });
            target.addEventListener('mouseleave', () => {
                target.style.transform = 'translate(0px, 0px)';
            });
        });

        /* Background Canvas Particle System for login atmosphere */
        const canvas = document.getElementById('login-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            const particleCount = Math.min(Math.floor(window.innerWidth / 12), 80);
            for(let i=0; i<particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speedY: - (Math.random() * 0.6 + 0.1),
                    alpha: Math.random() * 0.4 + 0.1
                });
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(198, 255, 0, ${p.alpha})`;
                ctx.fill();
                p.y += p.speedY;
                if(p.y < 0) {
                    p.y = canvas.height;
                    p.x = Math.random() * canvas.width;
                }
            });
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', () => {
            initCanvas();
        });

        window.onload = function() {
            initCanvas();
            animateParticles();
        }

        /* Password Visibility Toggle Utility */
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        /* Portal Toast Alert Helper */
        function showToast(message) {
            const container = document.getElementById('toast-container');
            
            const toast = document.createElement('div');
            toast.className = 'toast-box';
            toast.innerHTML = `<i class="fa-solid fa-circle-info" style="color:var(--accent-neon)"></i><span>${message}</span>`;
            
            container.appendChild(toast);
            
            // Trigger entry transition animation
            setTimeout(() => {
                toast.classList.add('show');
            }, 50);

            // Automatic dismissal loop
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    toast.remove();
                }, 400);
            }, 3000);
        }

        /* Elite Access Form Action */
        function handlePortalAccess(e) {
            e.preventDefault();
            
            const emailInput = document.getElementById('email').value.trim();
            const passwordInput = document.getElementById('password').value;
            
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');

            // Disable triggers & initiate animation loading state
            submitBtn.style.pointerEvents = 'none';
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';

            showToast("Verifying biometric authentication...");

            // Simulated transition delay for authentic biometric verification
            setTimeout(() => {
                if (emailInput === "admin@gmail.com" && passwordInput === "test123") {
                    showToast("Access Granted. Syncing administrator workspace...");
                    setTimeout(() => {
                        window.location.href = "admin.html";
                    }, 1000);
                } else if (emailInput === "user@gmail.com" && passwordInput === "test123") {
                    showToast("Access Granted. Syncing biometric dashboard...");
                    setTimeout(() => {
                        window.location.href = "user.html";
                    }, 1000);
                } else {
                    showToast("Invalid portal credentials.");
                    // Restore button state on verification failure
                    submitBtn.style.pointerEvents = 'auto';
                    btnText.style.display = 'block';
                    btnLoader.style.display = 'none';
                }
            }, 1500);
        }
    </script>
